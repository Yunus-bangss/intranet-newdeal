name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker image
        run: |
          docker build -t newdeal-intranet:${{ github.sha }} -f intranet-newdeal/Dockerfile intranet-newdeal/
      
      - name: Run container test
        run: |
          docker run -d --name test-container -p 8080:80 newdeal-intranet:${{ github.sha }}
          sleep 5
          docker logs test-container
          docker stop test-container
          docker rm test-container
      
      - name: Push to GitHub Container Registry
        run: |
          docker tag newdeal-intranet:${{ github.sha }} ghcr.io/${{ github.repository }}/newdeal-intranet:latest
          docker push ghcr.io/${{ github.repository }}/newdeal-intranet:latest