name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t newdeal-intranet:${{ github.sha }} -f intranet-newdeal/Dockerfile intranet-newdeal/
      
      - name: Run container test
        run: |
          docker run -d --name test-container -p 8080:80 newdeal-intranet:${{ github.sha }}
          sleep 5
          docker logs test-container
          docker stop test-container
          docker rm test-container
      
      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker tag newdeal-intranet:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/newdeal-intranet:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/newdeal-intranet:latest