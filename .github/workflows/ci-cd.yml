name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        run: |
          docker build -t newdeal-intranet:${{ github.sha }} -f intranet-newdeal/Dockerfile intranet-newdeal/
          docker tag newdeal-intranet:${{ github.sha }} ghcr.io/${{ github.repository }}/newdeal-intranet:latest
          docker push ghcr.io/${{ github.repository }}/newdeal-intranet:latest