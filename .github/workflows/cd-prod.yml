name: CD Pipeline - Prod

on:
  push:
    branches:
      - prod

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image locally
        run: docker build -t intranet-newdeal:prod .

      - name: Scan for CRITICAL vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'intranet-newdeal:prod'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL'

  deploy:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t intranet-newdeal:prod .

      - name: Run container on port 80
        run: |
          docker stop intranet-newdeal || true
          docker rm intranet-newdeal || true
          docker run -d --name intranet-newdeal -p 80:80 intranet-newdeal:prod

      - name: Verify deployment
        run: |
          sleep 3
          curl -s http://localhost:80 | head -5
          docker ps | grep intranet-newdeal

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send email notification
        run: |
          echo "=== Notification Pipeline Prod ==="
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Déploiement: ${{ needs.deploy.result }}"
          echo "Email envoyé à moussawade@groupeisi.com"