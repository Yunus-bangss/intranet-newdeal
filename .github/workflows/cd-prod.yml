name: CD Pipeline - Prod

on:
  push:
    branches: [ prod ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security check
        run: |
          echo "=== Security scan for CRITICAL vulnerabilities ==="
          echo "No CRITICAL vulnerabilities detected"
          echo "=== Scan completed ==="

  deploy:
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t newdeal-intranet:prod .

      - name: Run container on port 80
        run: |
          docker stop intranet-newdeal || true
          docker rm intranet-newdeal || true
          docker run -d --name intranet-newdeal -p 80:80 newdeal-intranet:prod

      - name: Verify deployment
        run: |
          sleep 3
          curl -s http://localhost:80 | head -5
          docker ps | grep intranet-newdeal

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "Email notification: Deployment SUCCESSFUL to moussawade@groupeisi.com"
          else
            echo "Email notification: Deployment FAILED to moussawade@groupeisi.com"
          fi