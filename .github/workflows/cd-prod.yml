name: CD - Prod Branch

on:
  push:
    branches: [ prod ]
  pull_request:
    branches: [ prod ]

env:
  IMAGE_NAME: newdeal-intranet
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/newdeal-intranet

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (config)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          severity: 'CRITICAL'

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.DOCKER_IMAGE }}:prod'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL'

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'

      - name: Fail on CRITICAL vulnerabilities
        run: |
          echo "Checking for CRITICAL vulnerabilities..."
          # If trivy finds critical issues, fail the pipeline
          if grep -q "CRITICAL" trivy-image-results.sarif 2>/dev/null || [ ! -f trivy-image-results.sarif ]; then
            echo "CRITICAL vulnerabilities detected - blocking deployment"
            exit 1
          else
            echo "No CRITICAL vulnerabilities found"
          fi

  deploy:
    runs-on: runner_prod
    needs: security-scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: prod

      - name: Pull Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker pull ${{ env.DOCKER_IMAGE }}:prod

      - name: Stop existing container
        run: |
          docker stop newdeal-intranet || true
          docker rm newdeal-intranet || true

      - name: Deploy container on port 80
        run: |
          docker run -d \
            --name newdeal-intranet \
            -p 80:80 \
            ${{ env.DOCKER_IMAGE }}:prod

      - name: Verify deployment
        run: |
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo "Service check"
          docker ps | grep newdeal-intranet

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Send success email
        if: needs.deploy.result == 'success'
        run: |
          echo "Deployment successful - Notification would be sent to: moussawade@groupeisi.com"
          echo "Subject: [CD] Production Deployment SUCCESS - Newdeal Intranet"
          echo "Body: The production deployment completed successfully."

      - name: Send failure email
        if: needs.deploy.result != 'success'
        run: |
          echo "Deployment failed - Notification would be sent to: moussawade@groupeisi.com"
          echo "Subject: [CD] Production Deployment FAILED - Newdeal Intranet"
          echo "Body: The production deployment failed. Please check the logs."