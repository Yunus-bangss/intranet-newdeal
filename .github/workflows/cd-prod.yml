name: CD Pipeline - Prod

on:
  push:
    branches:
      - prod

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull image and scan
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "Logging in to Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev
            echo "Pull successful"
          else
            echo "Skip - Docker Hub credentials not configured"
          fi

      - name: Scan for CRITICAL vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL'

  deploy:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull and deploy
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev
            docker stop intranet-newdeal || true
            docker rm intranet-newdeal || true
            docker run -d --name intranet-newdeal -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev
            echo "Deployment successful"
          else
            echo "Skip deployment - Docker Hub not configured"
          fi

      - name: Verify deployment
        run: |
          sleep 3
          curl -s http://localhost:80 | head -5
          docker ps | grep intranet-newdeal || echo "Container not running"

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send email notification
        run: |
          echo "=== Notification Pipeline Prod ==="
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Déploiement: ${{ needs.deploy.result }}"
          echo "Email envoyé à moussawade@groupeisi.com"