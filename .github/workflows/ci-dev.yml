name: CI Pipeline - Dev

on:
  push:
    branches: [ dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t newdeal-intranet:dev .
          docker images

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run basic security check
        run: |
          echo "=== Scan for secrets ==="
          if grep -r "password\|secret\|api_key" . 2>/dev/null | grep -v ".git\|node_modules\|binary\|vendor"; then
            echo "Warning: Potential secrets found"
          else
            echo "No obvious secrets found"
          fi
          echo "=== Security scan completed ==="

  push-image:
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and tag image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/newdeal-intranet:dev .

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/newdeal-intranet:dev