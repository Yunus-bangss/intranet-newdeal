name: CI Pipeline - Dev

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (nginx:alpine3.23-slim)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev
          load: true

      - name: Save image as artifact
        run: |
          docker save ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev > image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: Load Docker image
        run: docker load < image.tar

      - name: Scan for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --verbose

  push:
    runs-on: ubuntu-latest
    needs: security-scan
    if: success()
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: Load Docker image
        run: docker load < image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev

  notify:
    runs-on: ubuntu-latest
    needs: [build, security-scan, push]
    if: always()
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 'Pipeline Dev - ${{ needs.push.result }}'
          body: |
            Statut du pipeline CI (branche dev):
            - Build: ${{ needs.build.result }}
            - Security Scan: ${{ needs.security-scan.result }}
            - Push: ${{ needs.push.result }}
            
            Pipeline exécuté automatiquement suite au push sur la branche dev.
          to: moussawade@groupeisi.com
          from: ${{ secrets.EMAIL_USERNAME }}